services:
    test-api:
      container_name: security-api
      image: security:prd
      build: .
      restart: always
      volumes:
        - ./app:/home/jonnattan/app
      ports:
        - "8079:8079"
      env_file:
        - ../envs/security.env
      networks:
        - db-net
      command: tail -f /home/jonnattan/requirements.txt
networks:
  db-net:
